<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Tejas 🧸</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
    <h2>💌 You got something...</h2>
    <button onclick="enterApp()">Open</button>
</div>

<!-- CHARACTER -->
<div id="tejas">

    <div class="hat"></div>

    <div class="body"></div>

    <div class="face">
        <div class="eyes">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="blush"></div>
        <div class="mouth"></div>
    </div>

    <div class="legs">
        <div class="leg left-leg"></div>
        <div class="leg right-leg"></div>
    </div>

</div>

<div id="msg"></div>

<div class="controls">
    <button onclick="hug()">🤗</button>
    <button onclick="kiss()">😘</button>
    <button onclick="tickle()">🪶</button>
    <button onclick="slap()">😤</button>
</div>

<script src="script.js"></script>
</body>
</html>
